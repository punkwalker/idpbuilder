# AWS_AGENT INSTALL RESOURCES
# This file is auto-generated with 'hack/aws-agent/generate-manifests.sh'
apiVersion: v1
data:
  entrypoint.sh: "#! /bin/sh\n\necho \"Starting EC2 Mock agent...\"\n\ntrap _term
    SIGTERM\n\ninit(){\n    export CONFIG_PATH=\"/root/.ec2-metadata-mock/.aemm-config-used.json\"\n
    \   echo \"Setting up IMDS loopback interface...\"\n    ifconfig lo:0 169.254.169.254
    netmask 255.255.255.255\n\n    echo \"Installing AWS CLI...\"\n    apk --update
    add aws-cli\n    apk --update add jq\n\n    echo \"Installing EC2 Mock CLI...\"\n
    \   wget https://github.com/aws/amazon-ec2-metadata-mock/releases/download/v1.11.2/ec2-metadata-mock-linux-arm64
    -O /usr/local/bin/ec2-metadata-mock\n    chmod +x /usr/local/bin/ec2-metadata-mock\n\n
    \   echo \"Generating EC2 Mock agent config...\"\n    ec2-metadata-mock -s &>
    /dev/null &\n    kill -TERM $!\n\n    # wget https://raw.githubusercontent.com/slimm609/mock-instance-profile/main/mock_template.json
    -O mock_template.json\n\n    #static mock values\n\n    export ACCOUNT_ID=$(echo
    $ROLE_ARN | awk -F ':' '{print $5}')\n    export ROLE_NAME=$(echo $ROLE_ARN |
    awk -F '/' '{print $NF}')\n    echo $(jq --arg role_name \"$ROLE_NAME\" '.metadata.values[\"iam-security-credentials-role\"]
    |= $role_name' $CONFIG_PATH) > $CONFIG_PATH\n    echo $(jq --arg val \"/latest/meta-data/iam/security-credentials/$ROLE_NAME\"
    '.metadata.paths[\"iam-security-credentials\"] |= $val' $CONFIG_PATH) > $CONFIG_PATH\n
    \   echo $(jq --arg role_arn \"$ROLE_ARN\" '.metadata.values.\"iam-info\"[\"InstanceProfileArn\"]
    |= $role_arn' $CONFIG_PATH) > $CONFIG_PATH\n}\n\nrefresh_credentials(){\n\n    echo
    \"Assuming role and fetching credntials...\"\n    export LAST_UPDATED=$(date -u
    +\"%Y-%m-%dT%H:%M:%SZ\")\n    # TODO: Add retry if aws command fails\n    export
    $(printf \"ACCESS_KEY_ID=%s SECRET_ACCESS_KEY=%s SESSION_TOKEN=%s EXPIRATION=%s\"
    \\\n        $(aws sts assume-role \\\n        --role-arn $ROLE_ARN \\\n        --role-session-name
    $(hostname) \\\n        --query \"Credentials.[AccessKeyId,SecretAccessKey,SessionToken,Expiration]\"
    \\\n        --output text))\n    export LAST_UPDATED=$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")\n\n
    \   echo \"Refreshing EC2 Mock assumed role credentials...\"\n\n    # Update credntials
    in config file\n    echo $(jq --arg access_key_id \"$ACCESS_KEY_ID\" '.metadata.values.\"iam-security-credentials\"[\"AccessKeyId\"]
    |= $access_key_id' $CONFIG_PATH) > $CONFIG_PATH\n    echo $(jq --arg secret_access_key
    \"$SECRET_ACCESS_KEY\" '.metadata.values.\"iam-security-credentials\"[\"SecretAccessKey\"]
    |= $secret_access_key' $CONFIG_PATH) > $CONFIG_PATH\n    echo $(jq --arg session_token
    \"$SESSION_TOKEN\" '.metadata.values.\"iam-security-credentials\"[\"Token\"] |=
    $session_token' $CONFIG_PATH) > $\n    echo $(jq --arg access_key_id \"$ACCESS_KEY_ID\"
    '.metadata.values.\"iam-info\"[\"InstanceProfileId\"] |= $access_key_id' $CONFIG_PATH)
    > $CONFIG_PATH\n    echo $(jq --arg expiration \"$EXPIRATION\" '.metadata.values.\"iam-security-credentials\"[\"Expiration\"]
    |= $expiration' $CONFIG_PATH) > $CONFIG_PATH\n    echo $(jq --arg last_updated
    \"$LAST_UPDATED\" '.metadata.values.\"iam-security-credentials\"[\"LastUpdated\"]
    |= $last_updated' $CONFIG_PATH) > $CONFIG_PATH\n    echo $(jq --arg last_updated
    \"$LAST_UPDATED\"'.metadata.values.\"iam-info\"[\"LastUpdated\"] |= $last_updated'
    $CONFIG_PATH) > $CONFIG_PATH\n\n    # Update AccountID in config file\n    echo
    $(jq --arg account_id \"$ACCOUNT_ID\" '.dynamic.values.\"instance-identity-document\"[\"accountId\"]
    |= $account_id' $CONFIG_PATH) > $CONFIG_PATH\n}\n\nterm(){\n    echo \"Stopping
    EC2 Mock agent...\"\n    kill -TERM $MOCK_PID\n}\n\nstart_mock_loop(){\n    while
    :\n    do  \n        if ![ -z $MOCK_PID ]; then\n            term\n        fi\n
    \       \n        refresh_credentials\n        echo \"Starting EC2 Mock agent...\"\n
    \       ec2-metadata-mock -p 80 -n 169.254.169.254 -c $CONFIG_PATH &> /dev/null
    &\n        MOCK_PID=$!\n\n        # Sleep for 3595 (1 hr - 5 seconds) then refresh
    credentials\n        sleep 3595\n        wait $!\n    done\n}\n\ninit\nstart_mock_loop\n\n\n\n"
kind: ConfigMap
metadata:
  name: aws-agent-config
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    k8s-app: aws-agent
  name: aws-agent
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: aws-agent
  template:
    metadata:
      labels:
        name: aws-agent
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - /scripts/entrypoint.sh
        env:
        - name: ROLE_ARN
          value: arn:aws:iam::259732043995:role/Admin
        image: alpine:latest
        name: agent
        resources:
          limits:
            memory: 200Mi
          requests:
            cpu: 200m
            memory: 200Mi
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
        volumeMounts:
        - mountPath: /scripts
          name: entrypoint-script
      hostNetwork: true
      terminationGracePeriodSeconds: 30
      tolerations:
      - operator: Exists
      volumes:
      - configMap:
          defaultMode: 484
          name: aws-agent-config
        name: entrypoint-script
